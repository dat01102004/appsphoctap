name: appsshoptap

environment:
  sdk: ">=3.10.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.4.0
  flutter_secure_storage: ^9.0.0
  image_picker: ^1.0.7
  flutter_tts: ^3.8.5
  just_audio: ^0.10.4
  path_provider: ^2.1.5
  speech_to_text: 7.0.0
  permission_handler: ^11.3.1
  provider: ^6.1.2
  camera: ^0.12.0
  photo_manager: ^3.9.0
  image: ^4.1.7
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/logo/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo/logo2.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/logo/logo2.png"
  remove_alpha_ios: true
  min_sdk_android: 21
